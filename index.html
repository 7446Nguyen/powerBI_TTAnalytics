<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Table Tennis Analytics Dashboard</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QFK4X0NXGM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-QFK4X0NXGM');
  </script>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #4f8ef7;
      --accent-2:  #f7934f;
      --text:      #e8eaf0;
      --muted:     #8890a4;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.5;
    }

    /* ── Layout ── */
    .page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .site-title {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .site-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 99px;
      background: rgba(79, 142, 247, 0.15);
      color: var(--accent);
      border: 1px solid rgba(79, 142, 247, 0.3);
      font-weight: 500;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    /* ── Main content ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 2rem 2rem;
      gap: 1rem;
    }

    /* ── Dashboard wrapper ── */
    .dashboard-container {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .dashboard-header {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot-red   { background: #ff5f57; }
    .dot-amber { background: #ffbd2e; }
    .dot-green { background: #28c841; }

    .dashboard-label {
      font-size: 0.78rem;
      color: var(--muted);
      margin-left: auto;
    }

    .iframe-wrap {
      flex: 1;
      position: relative;
      min-height: 600px;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--surface);
      transition: opacity 0.4s ease;
      pointer-events: none;
      z-index: 10;
    }

    .loading-overlay.hidden {
      opacity: 0;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 0.75rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      main { padding: 1rem 1rem 1.5rem; }
      .badge { display: none; }
      .iframe-wrap { min-height: 400px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <header>
      <div class="header-left">
        <div class="logo">🏓</div>
        <div>
          <div class="site-title">Table Tennis Analytics</div>
          <div class="site-subtitle">Performance Dashboard</div>
        </div>
      </div>
      <span class="badge">Power BI</span>
    </header>

    <main>
      <div class="dashboard-container">
        <div class="dashboard-header">
          <span class="dot dot-red"></span>
          <span class="dot dot-amber"></span>
          <span class="dot dot-green"></span>
          <span class="dashboard-label">Live Report · Power BI Embedded</span>
        </div>

        <div class="iframe-wrap">
          <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <span class="loading-text">Loading dashboard…</span>
          </div>

          <iframe
            id="reportFrame"
            title="Table Tennis Analytics Dashboard"
            src="https://app.powerbi.com/view?r=eyJrIjoiYzBhNDRmNjMtZWU5Yi00NWY0LWFkMzctMGYwNTdlMWU2MDUyIiwidCI6IjYxMmMyNTVlLTAwMzMtNDk1Mi05NjQ5LWI4ZWFlYzE1ODA0NiJ9&embedImagePlaceholder=true"
            allowFullScreen="true"
          ></iframe>
        </div>
      </div>
    </main>

    <footer>
      Built with <a href="https://powerbi.microsoft.com" target="_blank" rel="noopener">Power BI</a>
      · Hosted on <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a>
    </footer>

  </div>

  <script>
    // Hide the loading overlay once the iframe loads
    const frame = document.getElementById('reportFrame');
    const overlay = document.getElementById('loadingOverlay');

    frame.addEventListener('load', () => {
      overlay.classList.add('hidden');
    });

    // Fallback: hide after 8s in case the load event doesn't fire (cross-origin)
    setTimeout(() => overlay.classList.add('hidden'), 8000);
  </script>
</body>
</html>
